<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Liophex</title>

    <link rel="icon" type="image/png" href="Leo.png" />
    <style>
      body {
        text-align: center;
        margin: 0;
        padding: 0;
        font-family: sans-serif;
      }

      .squish {
        transition: transform 0.01s ease;
        cursor: pointer;
      }

      .counter-container {
        margin: 10px 0;
        font-size: 18px;
      }

    </style>

    <script>
      let clickCount = 0;

      function squeak() {
        const audio = new Audio("squeak.mp3");
        audio.play();
      }

      function randomSquish(el) {
        const scaleX = (Math.random() * 0.3 + 0.6).toFixed(2);
        const scaleY = (Math.random() * 0.3 + 0.6).toFixed(2);

        el.style.transform = `scale(${scaleX}, ${scaleY})`;

        setTimeout(() => {
          el.style.transform = "scale(1)";
        }, 120);
      }
    </script>
  </head>

  <body>
    <img
      src="Leo.png"
      alt="leo"
      class="squish"
      onclick="squeak(); randomSquish(this);"
    />
    <a href="bouncyleo/leo.html">Leo Bouncy</a></li>
  </body>
</html>

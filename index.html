      function squeak() {
        const audio = new Audio("squeak.mp3");
        audio.play();
        updateCounter();
      }

      function updateCounter() {
        clickCount++;
        localStorage.setItem('leoClickCount', clickCount);
        document.getElementById('clickCounter').textContent = clickCount;
      }

      function resetCounter() {
        clickCount = 0;
        localStorage.setItem('leoClickCount', clickCount);
        document.getElementById('clickCounter').textContent = clickCount;
      }

      function loadCounter() {
        const saved = localStorage.getItem('leoClickCount');
        clickCount = saved ? parseInt(saved) : 0;
        document.getElementById('clickCounter').textContent = clickCount;
      }

      function randomSquish(el) {
        const scaleX = (Math.random() * 0.3 + 0.6).toFixed(2);
        const scaleY = (Math.random() * 0.3 + 0.6).toFixed(2);

        el.style.transform = `scale(${scaleX}, ${scaleY})`;

        setTimeout(() => {
          el.style.transform = "scale(1)";
        }, 120);
      }

      /* apply language */
      function setLang(lang) {
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          el.innerHTML = translations[lang][el.dataset.i18n];
        });
      }

      window.onload = () => {
        const lang = navigator.language || navigator.userLanguage;
        const lower = lang.toLowerCase();

        let chosen = "en"; // fallback

        if (lower.startsWith("pl")) chosen = "pl";
        else if (lower.startsWith("lt")) chosen = "lt";
        else if (lower.startsWith("de")) chosen = "de";
        else if (lower.startsWith("ru")) chosen = "ru";

  setLang(chosen);
  loadCounter();
};
